<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep ocean to midnight navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2137"/>
      <stop offset="100%" style="stop-color:#0A3554"/>
    </linearGradient>

    <!-- Amber glow for accent trail -->
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F6A623;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#F6A623;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FDD27A;stop-opacity:0.6"/>
    </linearGradient>

    <!-- White glow filter on T -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow on plane -->
    <filter id="planeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#F6A623" flood-opacity="0.6"/>
    </filter>

    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (globe/map feel) -->
  <g clip-path="url(#roundedClip)" opacity="0.07" stroke="#FFFFFF" stroke-width="1.2" fill="none">
    <!-- Vertical lines -->
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <!-- Diagonal arc (globe curve) -->
    <ellipse cx="256" cy="256" rx="160" ry="256"/>
    <ellipse cx="256" cy="256" rx="256" ry="160"/>
  </g>

  <!-- Flight arc trail (amber) -->
  <path
    d="M 90 360 Q 210 140 420 155"
    stroke="url(#trailGrad)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Dashed trail dots along the arc -->
  <g fill="#F6A623" opacity="0.6">
    <circle cx="120" cy="325" r="3.5"/>
    <circle cx="158" cy="265" r="3.5"/>
    <circle cx="205" cy="213" r="3.5"/>
    <circle cx="260" cy="179" r="3.5"/>
    <circle cx="318" cy="162" r="3.5"/>
    <circle cx="375" cy="156" r="3.5"/>
  </g>

  <!-- Bold T letterform (white) — centered, geometric -->
  <!-- Horizontal bar of T -->
  <rect x="136" y="168" width="240" height="58" rx="10" ry="10" fill="#FFFFFF" filter="url(#glow)"/>
  <!-- Vertical stem of T -->
  <rect x="221" y="168" width="70" height="184" rx="10" ry="10" fill="#FFFFFF" filter="url(#glow)"/>

  <!-- Paper airplane at end of trail -->
  <g transform="translate(408, 142) rotate(-18)" filter="url(#planeShadow)">
    <!-- Plane body -->
    <polygon points="0,0 -44,18 -12,18" fill="#FFFFFF"/>
    <polygon points="0,0 -44,18 -44,4" fill="#E0E8F0"/>
    <!-- Wing tip -->
    <polygon points="0,0 -44,18 -30,-8" fill="#D4E3F0"/>
    <!-- Tail flick -->
    <polygon points="-44,18 -52,28 -40,18" fill="#F6A623"/>
  </g>

  <!-- Amber accent dot (destination pin feel) -->
  <circle cx="408" cy="142" r="6" fill="#FDD27A" opacity="0.9"/>
</svg>
